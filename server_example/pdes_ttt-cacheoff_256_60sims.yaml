# PDE-S WITH TTT (state cache OFF during training), official APE2D data,
# native 256 resolution (no downsampling). Single 1080 Ti: batch 2 x accum 64
# keeps the effective batch at 128 like the 128-res runs.
work_dir: ~/working
data_dir: ~/working/datasets_official
run_root: ~/working/runs_v2
run_name: pdes_ttt-cacheoff_256_60sims
model_type: PDE-S
use_ttt_window_attention: true
use_ttt_state_cache_train: false

max_epochs: 100
batch_size: 2
num_workers: 2
devices: 1
strategy: auto
precision: 32-true
accumulate_grad_batches: 64
seed: 42

downsample_factor: 1
sample_size: 256

resume: false
auto_resume: true
checkpoint_path: null
skip_rollout_eval: false
generate_data: false
