# PDE-S with original spatial attention and one causal persistent TTT-MLP at
# the 8x8x384 latent. Fast weights persist across all 29 physical time steps;
# gradients through the state are truncated every four steps.
work_dir: ~/working
data_dir: ~/working/datasets
run_root: ~/working/runs_v3
run_name: pdes_attention-temporal-ttt-mlp_128_20ep_60sims
model_type: PDE-S
in_channels: 2
out_channels: 2
patch_size: 4
periodic: true
carrier_token_active: false

use_ttt_window_attention: false
token_mixer_type: attention
use_ttt_state_cache_train: false
global_ttt_stage_names: []

training_mode: temporal_rollout
train_unrolling_steps: 29
train_step_size: 29
tbptt_chunk_size: 4
temporal_ttt_enabled: true
temporal_ttt_layer_type: mlp
temporal_ttt_mini_batch_size: 64
temporal_ttt_base_lr: 1.0
temporal_ttt_gate_init: 0.1
temporal_ttt_learning_rate: 1.0e-4
temporal_ttt_use_output_gate: false
temporal_ttt_scan_checkpoint_group_size: 0

# Fine-tune from the strongest matching attention model instead of relearning
# the spatial solver. Only temporal TTT parameters are absent in this checkpoint.
init_checkpoint_path: ~/working/runs_v2/pdes_plain_128_60sims/checkpoints/epoch-epoch=096.ckpt
checkpoint_path: null
auto_resume: true
resume: false

learning_rate: 1.0e-5
max_epochs: 20
batch_size: 1
num_workers: 2
downsample_factor: 2
sample_size: 128
test_unrolling_steps: 29
max_channels: 2

devices: 2
strategy: ddp
precision: 32-true
# TemporalRolloutSupervised performs this accumulation itself; the Trainer is
# forced to one because Lightning automatic accumulation is incompatible with
# manual TBPTT backward calls.
accumulate_grad_batches: 8
seed: 42
skip_rollout_eval: false
generate_data: false
low_res: true
