# PDE-S with the ViT^3-style local TTT mixer replacing window attention.
# No cache-on variant is provided: PDEViTTTWindowBlock has no cross-step state cache.
work_dir: ~/working
data_dir: ~/working/datasets
run_root: ~/working/runs_v2
run_name: pdes_vittt-cacheoff_128_60sims
model_type: PDE-S
in_channels: 2
out_channels: 2
patch_size: 4
periodic: true
carrier_token_active: false

token_mixer_type: vittt
use_ttt_window_attention: false
use_ttt_state_cache_train: false
training_mode: single_step
train_unrolling_steps: 1
train_step_size: 1
temporal_ttt_enabled: false
vittt_inner_lr: 1.0
vittt_padding_mode: zero

learning_rate: 4.0e-5
max_epochs: 100
batch_size: 8
num_workers: 2
devices: 1
strategy: auto
precision: 32-true
accumulate_grad_batches: 16
seed: 42

downsample_factor: 2
sample_size: 128
test_unrolling_steps: 29
max_channels: 2

resume: false
auto_resume: true
checkpoint_path: null
skip_rollout_eval: false
generate_data: false
